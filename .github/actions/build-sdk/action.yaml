name: "Build Python SDK"
description: "Build all API versions of the Python SDK from OpenAPI specs"

inputs:
  api-specs-path:
    description: "Path to the checked-out api-specs repository"
    required: false
    default: "api-specs"
  skip-tests:
    description: "Skip running tests after building"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: "20"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Download OpenAPI Generator
      shell: bash
      run: |
        wget -q https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.12.0/openapi-generator-cli-7.12.0.jar -O openapi-generator-cli.jar

    - name: Build Versioned SDK (per-partition)
      shell: bash
      run: |
        node sdk-resources/build-versioned-sdk.js \
          ${{ inputs.api-specs-path }}/idn/src/main/yaml/apis

    - name: Build NERM SDK
      shell: bash
      run: |
        rm -rf ./sailpoint/nerm
        java -jar openapi-generator-cli.jar generate \
          -i ${{ inputs.api-specs-path }}/nerm/openapi.yaml \
          -g python -o . \
          --global-property skipFormModel=false,apiDocs=true,modelDocs=true \
          --config sdk-resources/nerm-config.yaml \
          --enable-post-process-file
        node sdk-resources/postscript.js ./sailpoint/nerm

    - name: Build NERM V2025 SDK
      shell: bash
      run: |
        rm -rf ./sailpoint/nerm/v2025
        java -jar openapi-generator-cli.jar generate \
          -i ${{ inputs.api-specs-path }}/nerm/v2025/v2025.yaml \
          -g python -o . \
          --global-property skipFormModel=false,apiDocs=true,modelDocs=true \
          --config sdk-resources/v2025-nerm-config.yaml \
          --enable-post-process-file
        node sdk-resources/postscript.js ./sailpoint/nerm/v2025

    - name: Build and Test
      shell: bash
      run: |
        pip install -r requirements.txt
        pip install -e .
        if [ "${{ inputs.skip-tests }}" != "true" ]; then
          python validation_test.py -v
        fi
