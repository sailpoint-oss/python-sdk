        from sailpoint.jit_activations_v1.api.jit_activations_v1_api import JITActivationsV1Api
        from sailpoint.jit_activations_v1.api_client import ApiClient
        from sailpoint.jit_activations_v1.models.jitactivationactivaterequest import Jitactivationactivaterequest
        from sailpoint.jit_activations_v1.models.jitactivationactivateresponse import Jitactivationactivateresponse
        from sailpoint.configuration import Configuration
        configuration = Configuration()


        with ApiClient(configuration) as api_client:
          jitactivationactivaterequest = '''sailpoint.jit_activations_v1.Jitactivationactivaterequest()''' # Jitactivationactivaterequest | 
          try:
              # Start JIT activation workflow
              new_jitactivationactivaterequest = Jitactivationactivaterequest.from_json(jitactivationactivaterequest)
              results = JITActivationsV1Api(api_client).start_activate_workflow_v1(jitactivationactivaterequest=new_jitactivationactivaterequest)
