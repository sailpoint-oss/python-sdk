        from sailpoint.password_management_v1.api_client import ApiClient
        from sailpoint.password_management_v1.models.passworddigittoken import Passworddigittoken
        from sailpoint.password_management_v1.models.passworddigittokenreset import Passworddigittokenreset
        from sailpoint.configuration import Configuration
        configuration = Configuration()

        configuration.experimental = True

        with ApiClient(configuration) as api_client:
          passworddigittokenreset = '''{"userId":"Abby.Smith","length":8,"durationMinutes":5}''' # Passworddigittokenreset | 
          x_sail_point_experimental = 'true' # str | Use this header to enable this experimental API. (optional) (default to 'true') # str | Use this header to enable this experimental API. (optional) (default to 'true')
          try:
              # Generate a digit token
              new_passworddigittokenreset = Passworddigittokenreset.from_json(passworddigittokenreset)
              results = PasswordManagementV1Api(api_client).create_digit_token_v1(passworddigittokenreset=new_passworddigittokenreset)
              # Below is a request that includes all optional parameters
