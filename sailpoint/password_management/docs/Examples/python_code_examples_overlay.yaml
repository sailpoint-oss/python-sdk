- path: /generate-password-reset-token/v1/digit
  method: POST
  xCodeSample:
    - lang: Python
      label: SDK_tools/sdk/python/password-management/methods/password-management#create-digit-token-v1
      source: |
        from sailpoint.password_management.api.password_management_api import PasswordManagementApi
        from sailpoint.password_management.api_client import ApiClient
        from sailpoint.password_management.models.password_digit_token import PasswordDigitToken
        from sailpoint.password_management.models.password_digit_token_reset import PasswordDigitTokenReset
        from sailpoint.configuration import Configuration
        configuration = Configuration()

        configuration.experimental = True

        with ApiClient(configuration) as api_client:
          password_digit_token_reset = '''{
          "durationMinutes" : 5,
          "length" : 8,
          "userId" : "Abby.Smith"
        }''' # PasswordDigitTokenReset | 
          x_sail_point_experimental = 'true' # str | Use this header to enable this experimental API. (optional) (default to 'true') # str | Use this header to enable this experimental API. (optional) (default to 'true')
          try:
              # Generate a digit token
              new_password_digit_token_reset = PasswordDigitTokenReset.from_json(password_digit_token_reset)
              results = PasswordManagementApi(api_client).create_digit_token_v1(password_digit_token_reset=new_password_digit_token_reset)
              # Below is a request that includes all optional parameters
              # results = PasswordManagementApi(api_client).create_digit_token_v1(new_password_digit_token_reset, x_sail_point_experimental)
              print("The response of PasswordManagementApi->create_digit_token_v1:\n")
              print(results.model_dump_json(by_alias=True, indent=4))
          except Exception as e:
              print("Exception when calling PasswordManagementApi->create_digit_token_v1: %s\n" % e)
